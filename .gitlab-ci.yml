variables:
  RUBY_VERSION: 3.2.2

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "schedule"

cocoapods-session-keepalive:
  stage: .pre
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/ruby:$RUBY_VERSION
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - 'curl -s -H "Authorization: Token $COCOAPODS_TRUNK_TOKEN" https://trunk.cocoapods.org/api/v1/sessions > /dev/null'

build-and-release:
  stage: build
  image:  ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/ruby:$RUBY_VERSION
  before_script:
    - apt-get update -y
    - apt-get install -y rsync
  script:
    - bundle install
    - |
      for POD in PrimerFoundation PrimerStepResolver PrimerBDCEngine PrimerBDCCore; do
        echo "Pushing ${POD}.podspec"
        pod trunk push "${POD}.podspec" --allow-root --allow-warnings --synchronous
      done
    - |
      ATTEMPTS=60
      SLEEP=30
      for i in $(seq 1 $ATTEMPTS); do
        pod repo update trunk >/dev/null 2>&1 || true
        if pod trunk push PrimerSDK.podspec --allow-root --allow-warnings --synchronous; then
          echo "Pushing PrimerSDK: succeeded after $i/$ATTEMPTS"
          exit 0
        fi
        echo "Pushing PrimerSDK: attempt $i/$ATTEMPTS failed; sleeping ${SLEEP}s"
        sleep "$SLEEP"
      done
      echo "Pushing PrimerSDK: never succeeded after $ATTEMPTS attempts" >&2
      exit 1
  when: manual
  environment: production
