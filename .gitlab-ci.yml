variables:
  RUBY_VERSION: 3.2.2

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "schedule"

cocoapods-session-keepalive:
  stage: .pre
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/ruby:$RUBY_VERSION
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - 'curl -s -H "Authorization: Token $COCOAPODS_TRUNK_TOKEN" https://trunk.cocoapods.org/api/v1/sessions > /dev/null'

build-and-release:
  stage: build
  timeout: 12h
  image:  ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/ruby:$RUBY_VERSION
  before_script:
    - apt-get update -y
    - apt-get install -y rsync
  script:
    - bundle install
    - bundle exec fastlane release_pods
  after_script:
    - |
      if [ "$CI_JOB_STATUS" != "success" ]; then
        curl -s -X POST https://slack.com/api/chat.postMessage \
          -H "Authorization: Bearer $SLACK_REPORTER_BOT_TOKEN" \
          -H 'Content-type: application/json' \
          --data "{\"channel\": \"$SLACK_MOBILE_SDK_CHANNEL\", \"text\": \"❌ CocoaPods release failed or timed out. Check pipeline: $CI_PIPELINE_URL\"}" >/dev/null 2>&1
      fi
  when: manual
  environment: production
