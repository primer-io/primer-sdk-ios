name: Create 3DS Klarna Tag

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create the 3DS Klarna tag for (e.g. 2.47.0)'
        required: true
        type: string

jobs:
  create-klarna-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.resolve.outputs.tag }}
          token: ${{ secrets.RELEASE_ACCESS_TOKEN }}

      - name: Get latest Klarna SDK version
        run: |
          KLARNA_VERSION=$(gh api repos/primer-io/primer-klarna-sdk-ios/releases/latest --jq '.tag_name')
          echo "KLARNA_VERSION=$KLARNA_VERSION" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Add Klarna dependency and tag
        env:
          RELEASE_TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          swift .github/scripts/add-klarna-dependency.swift $KLARNA_VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "Add Klarna Dependency"
          git tag "${RELEASE_TAG}-3ds-klarna"
          git push origin "${RELEASE_TAG}-3ds-klarna"
